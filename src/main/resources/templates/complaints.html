<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Keluhan Masyarakat</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap"
          rel="stylesheet">

    <style>
        body{
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen">

<div th:replace="layouts/sidebar :: sidebar"></div>

<main class="ml-72 min-h-screen">

    <div th:replace="layouts/navbar :: navbar"></div>

    <section class="p-8">

        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-800">
                    Keluhan Masyarakat
                </h1>

                <p class="text-slate-500 mt-2">
                    Tambah, lihat, dan pantau keluhan masyarakat.
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <div class="bg-white rounded-3xl p-6 shadow-lg border border-slate-100">
                <h2 class="text-xl font-extrabold text-slate-800 mb-5">
                    Tambah Keluhan
                </h2>

                <form action="/complaints/save"
                      method="post"
                      th:object="${complaint}"
                      class="space-y-4">

                    <div>
                        <label class="text-sm font-bold text-slate-600">
                            Judul
                        </label>

                        <input type="text"
                               th:field="*{title}"
                               required
                               class="w-full mt-2 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none"
                               placeholder="Contoh: Jalan Rusak">
                    </div>

                    <div>
                        <label class="text-sm font-bold text-slate-600">
                            Deskripsi
                        </label>

                        <textarea th:field="*{description}"
                                  required
                                  rows="5"
                                  class="w-full mt-2 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none"
                                  placeholder="Jelaskan keluhan masyarakat..."></textarea>
                    </div>

                    <button type="submit"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition shadow-lg shadow-blue-600/30">
                        Simpan Keluhan
                    </button>

                </form>
            </div>

            <div class="lg:col-span-2 bg-white rounded-3xl p-6 shadow-lg border border-slate-100">
                <h2 class="text-xl font-extrabold text-slate-800 mb-5">
                    Daftar Keluhan
                </h2>

                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                        <tr class="border-b text-left text-slate-500">
                            <th class="py-3">Judul</th>
                            <th class="py-3">Deskripsi</th>
                            <th class="py-3">Status</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:if="${#lists.isEmpty(complaints)}">
                            <td colspan="3" class="py-8 text-center text-slate-400">
                                Belum ada keluhan.
                            </td>
                        </tr>

                        <tr th:each="c : ${complaints}"
                            class="border-b hover:bg-slate-50">
                            <td class="py-4 font-bold text-slate-800"
                                th:text="${c.title}">
                                Judul
                            </td>

                            <td class="py-4 text-slate-500"
                                th:text="${c.description}">
                                Deskripsi
                            </td>

                            <td class="py-4">
                                <span class="px-3 py-1 rounded-full bg-yellow-100 text-yellow-700 text-sm font-bold"
                                      th:text="${c.status}">
                                    Diproses
                                </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>

        </div>

    </section>

</main>

</body>
</html>
