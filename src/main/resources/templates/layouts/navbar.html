<header th:fragment="navbar"
        class="bg-white/80 backdrop-blur-xl border-b border-slate-200 px-8 py-5 flex justify-between items-center sticky top-0 z-30">

    <div>
        <h2 class="text-2xl font-extrabold text-slate-800">
            Admin Dashboard
        </h2>
        <p class="text-sm text-slate-500">
            Sistem Keluhan & Layanan Masyarakat
        </p>
    </div>

    <div class="flex items-center gap-4">

        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center font-bold">
                A
            </div>

            <div>
                <p class="font-bold text-slate-800 text-sm"
                   th:text="${loggedUserName != null ? loggedUserName : 'Admin'}">
                    Admin
                </p>
                <p class="text-xs text-slate-500"
                   th:text="${loggedUserRole != null ? loggedUserRole : 'ADMIN'}">
                    ADMIN
                </p>
            </div>
        </div>

    </div>

    <script>
        function toggleDarkMode(){
            document.body.classList.toggle("bg-slate-900");
            document.body.classList.toggle("text-white");
        }
    </script>

</header>
