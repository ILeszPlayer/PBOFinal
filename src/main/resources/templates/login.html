<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(99, 102, 241, 0.1); }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(99, 102, 241, 0.08); }
        .gradient-border { position: relative; }
        .gradient-border::before { content: ''; position: absolute; inset: 0; border-radius: 1.5rem; padding: 1px; background: linear-gradient(135deg, #6366f1, #818cf8, #a5b4fc); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; }
        .input-field { transition: all 0.3s ease; }
        .input-field:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
        .btn-primary { transition: all 0.3s ease; background: linear-gradient(135deg, #6366f1, #818cf8); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35); }
        .btn-primary:active { transform: translateY(0); }
        .float-anim { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.08), transparent); background-size: 200% 100%; animation: shimmer 3s ease-in-out infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center p-4 overflow-hidden relative">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl float-anim"></div>
        <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl float-anim" style="animation-delay: -3s;"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-indigo-500/5 rounded-full blur-3xl shimmer"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <div class="glass rounded-3xl p-8 gradient-border">
            <div class="text-center mb-8">
                <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-indigo-500 to-indigo-600 flex items-center justify-center mx-auto mb-5 shadow-lg shadow-indigo-600/30">
                    <i class="fa-solid fa-building-columns text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">Smart Community</h1>
                <p class="text-slate-400 mt-2 text-sm">Sistem Pengaduan & Layanan Masyarakat</p>
            </div>

            <form action="/login" method="post" class="space-y-5">
                <div>
                    <label class="text-xs font-medium text-slate-300 block mb-2 uppercase tracking-wider">
                        <i class="fa-regular fa-envelope mr-1.5 text-indigo-400"></i>Email / Username
                    </label>
                    <div class="relative">
                        <input type="text" name="login" required
                               class="input-field w-full px-4 py-3.5 rounded-2xl bg-slate-800/50 text-white outline-none border border-slate-700/50 focus:border-indigo-500/50 text-sm placeholder:text-slate-500"
                               placeholder="admin@gmail.com">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-medium text-slate-300 block mb-2 uppercase tracking-wider">
                        <i class="fa-solid fa-lock mr-1.5 text-indigo-400"></i>Password
                    </label>
                    <div class="relative">
                        <input type="password" name="password" required
                               class="input-field w-full px-4 py-3.5 rounded-2xl bg-slate-800/50 text-white outline-none border border-slate-700/50 focus:border-indigo-500/50 text-sm placeholder:text-slate-500"
                               placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;">
                    </div>
                </div>

                <div th:if="${error}" class="flex items-center gap-3 bg-red-500/10 border border-red-500/20 text-red-300 px-4 py-3 rounded-2xl text-sm">
                    <i class="fa-solid fa-circle-exclamation text-red-400"></i>
                    <span th:text="${error}"></span>
                </div>
                <div th:if="${success}" class="flex items-center gap-3 bg-emerald-500/10 border border-emerald-500/20 text-emerald-300 px-4 py-3 rounded-2xl text-sm">
                    <i class="fa-solid fa-circle-check text-emerald-400"></i>
                    <span th:text="${success}"></span>
                </div>

                <button type="submit" class="btn-primary w-full py-3.5 rounded-2xl font-semibold text-white text-sm tracking-wide">
                    <i class="fa-solid fa-arrow-right-to-bracket mr-2"></i>Masuk
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-slate-500 text-xs">
                    Belum punya akun?
                    <a href="/register" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">
                        Daftar di sini <i class="fa-solid fa-arrow-right text-[10px] ml-0.5"></i>
                    </a>
                </p>
            </div>
        </div>

        <div class="mt-4 text-center">
            <p class="text-slate-600 text-[11px]">
                <i class="fa-regular fa-circle-info mr-1"></i>Demo: admin@gmail.com / admin123
            </p>
        </div>
    </div>
</body>
</html>
