<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Pengaduan - KomunServis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-950 text-slate-100 min-h-screen font-sans">

    <nav class="sticky top-0 z-40 bg-slate-900/80 backdrop-blur-xl border-b border-slate-700/50 shadow-lg">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/citizen/home" class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-sm shadow-lg shadow-indigo-500/20"><i class="fas fa-users text-white"></i></a>
                <div>
                    <span class="font-black text-sm tracking-tight">Komunitas</span>
                    <span class="text-indigo-400 font-black text-sm">Servis</span>
                </div>
                <div class="hidden md:flex items-center gap-1 ml-4">
                    <a href="/citizen/home" class="text-[10px] font-bold text-slate-300 hover:text-amber-400 px-3 py-1.5 rounded-lg hover:bg-amber-500/10 transition-all"><i class="fas fa-home mr-1"></i> Beranda</a>
                    <a href="/citizen/broadcasts" class="text-[10px] font-bold text-slate-300 hover:text-amber-400 px-3 py-1.5 rounded-lg hover:bg-amber-500/10 transition-all"><i class="fas fa-bullhorn mr-1"></i> Pengumuman</a>
                    <a href="/citizen/leaderboard" class="text-[10px] font-bold text-slate-300 hover:text-amber-400 px-3 py-1.5 rounded-lg hover:bg-amber-500/10 transition-all"><i class="fas fa-trophy mr-1"></i> Peringkat</a>
                    <a href="/citizen/polls" class="text-[10px] font-bold text-slate-300 hover:text-amber-400 px-3 py-1.5 rounded-lg hover:bg-amber-500/10 transition-all"><i class="fas fa-poll mr-1"></i> Polling</a>
                    <a href="/citizen/upvoted" class="text-[10px] font-bold text-slate-300 hover:text-amber-400 px-3 py-1.5 rounded-lg hover:bg-amber-500/10 transition-all"><i class="fas fa-arrow-up mr-1"></i> Didukung</a>
                    <a href="/citizen/notifications" class="text-[10px] font-bold text-slate-300 hover:text-amber-400 px-3 py-1.5 rounded-lg hover:bg-amber-500/10 transition-all"><i class="fas fa-bell mr-1"></i> Notifikasi</a>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="hidden md:inline-flex items-center gap-1.5 text-[10px] font-semibold text-slate-400 bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
                    <i class="fas fa-star text-amber-400 text-[9px]"></i>
                    <span th:text="${userPoints != null ? userPoints : 0}"></span> pts
                </span>
                <a href="/citizen/profile" class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-[10px] font-bold border-2 border-slate-700 hover:border-indigo-400 transition-all"><span th:text="${#strings.substring(userName != null ? userName : 'U', 0, 1).toUpperCase()}">U</span></a>
                <a href="/logout" class="text-red-400 hover:text-red-300 text-xs p-2 rounded-lg hover:bg-red-500/10 transition-all" title="Keluar"><i class="fas fa-sign-out-alt"></i></a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <div class="bg-slate-800/60 border border-slate-700 rounded-2xl p-8 shadow-xl">
            <h2 class="text-lg font-black text-slate-100 mb-6"><i class="fas fa-pen text-indigo-400 mr-2"></i> Edit Pengaduan</h2>

            <div th:if="${param.success}" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-4 py-3 rounded-xl text-xs font-bold mb-6 flex items-center gap-2"><i class="fas fa-check-circle"></i> Pengaduan berhasil diperbarui!</div>
            <div th:if="${param.error}" class="bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-xl text-xs font-bold mb-6 flex items-center gap-2"><i class="fas fa-exclamation-circle"></i> Gagal memperbarui pengaduan. Silakan coba lagi.</div>

            <form th:action="@{/citizen/complaint/{id}/edit(id=${c.id})}" method="post" enctype="multipart/form-data" class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1.5">Judul</label>
                    <input type="text" name="judul" th:value="${c.judul}" required class="w-full bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1.5">Kategori</label>
                    <select name="kategori" class="w-full bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        <option th:each="k : ${kategoris}" th:value="${k.name()}" th:text="${k.displayName}" th:selected="${c.kategori == k}"></option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1.5">Deskripsi</label>
                    <textarea name="isiPengaduan" rows="5" required class="w-full bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all" th:text="${c.isiPengaduan}"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1.5">Foto (biarkan kosong jika tidak diubah)</label>
                    <input type="file" name="foto" accept="image/*" class="w-full text-sm text-slate-400 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-indigo-500/20 file:text-indigo-400 hover:file:bg-indigo-500/30 transition-all">
                </div>
                <div th:if="${c.buktiFoto != null and !c.buktiFoto.isEmpty()}" class="bg-slate-700/30 rounded-xl p-3 flex items-center gap-3">
                    <img th:src="${c.buktiFoto}" class="w-16 h-16 object-cover rounded-lg">
                    <span class="text-[10px] text-slate-400">Foto saat ini</span>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" name="isAnonymous" value="true" th:checked="${c.isAnonymous}" id="anonCheck" class="rounded bg-slate-700 border-slate-600 text-indigo-500 focus:ring-indigo-500/50">
                    <label for="anonCheck" class="text-xs text-slate-400">Ajukan secara anonim</label>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-3 px-6 rounded-xl text-sm transition-all shadow-lg shadow-indigo-500/20"><i class="fas fa-save mr-1.5"></i> Simpan Perubahan</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
