<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Community Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .glass {
            background: rgba(15, 23, 42, 0.78);
            backdrop-filter: blur(16px);
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950 flex items-center justify-center px-5">

<div class="absolute top-0 left-0 w-72 h-72 bg-blue-500/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-0 right-0 w-72 h-72 bg-indigo-500/20 rounded-full blur-3xl"></div>

<div class="glass relative w-full max-w-md rounded-3xl p-8 shadow-2xl border border-slate-700">

    <div class="text-center mb-8">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-5 shadow-lg shadow-blue-600/30">
            <span class="text-4xl">🏙️</span>
        </div>

        <h1 class="text-4xl font-extrabold text-white">
            Smart Community
        </h1>

        <p class="text-slate-400 mt-3">
            Sistem Keluhan & Layanan Masyarakat
        </p>
    </div>

    <form action="/login" method="post" class="space-y-5">

        <div>
            <label class="text-sm text-slate-300 block mb-2">
                Email / Username
            </label>

            <input type="text"
                   name="login"
                   required
                   class="w-full px-4 py-3 rounded-xl bg-slate-800 text-white outline-none border border-slate-600 focus:ring-2 focus:ring-blue-500"
                   placeholder="admin@gmail.com atau Admin">
        </div>

        <div>
            <label class="text-sm text-slate-300 block mb-2">
                Password
            </label>

            <input type="password"
                   name="password"
                   required
                   class="w-full px-4 py-3 rounded-xl bg-slate-800 text-white outline-none border border-slate-600 focus:ring-2 focus:ring-blue-500"
                   placeholder="Masukkan password">
        </div>

        <div th:if="${error}"
             class="bg-red-500/15 border border-red-500/50 text-red-300 px-4 py-3 rounded-xl text-sm">
            <span th:text="${error}"></span>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 transition-all py-3 rounded-xl font-bold text-white shadow-lg shadow-blue-600/30">
            Login
        </button>

    </form>

    <div class="mt-6 text-center text-sm text-slate-500">
        Default admin: admin@gmail.com / admin123
    </div>

</div>

</body>
</html>
