<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Smart Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(99, 102, 241, 0.1); }
        .input-field { transition: all 0.3s ease; }
        .input-field:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
        .input-field.error { border-color: rgba(239, 68, 68, 0.5); }
        .btn-primary { transition: all 0.3s ease; background: linear-gradient(135deg, #6366f1, #818cf8); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35); }
    </style>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center p-4 overflow-hidden relative">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl"></div>
    </div>

    <div class="w-full max-w-lg relative z-10">
        <div class="glass rounded-3xl p-8">
            <div class="text-center mb-6">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-indigo-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-600/30">
                    <i class="fa-solid fa-user-plus text-2xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Buat Akun Baru</h1>
                <p class="text-slate-400 text-sm mt-1">Daftar sebagai warga untuk mengajukan pengaduan</p>
            </div>

            <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-medium text-slate-300 block mb-1.5">
                            <i class="fa-solid fa-user mr-1 text-indigo-400"></i>Nama Lengkap
                        </label>
                        <input type="text" th:field="*{nama}" required
                               class="input-field w-full px-4 py-3 rounded-xl bg-slate-800/50 text-white outline-none border border-slate-700/50 focus:border-indigo-500/50 text-sm placeholder:text-slate-500"
                               placeholder="Nama Anda">
                        <p th:if="${#fields.hasErrors('nama')}" class="text-red-400 text-xs mt-1 flex items-center gap-1">
                            <i class="fa-solid fa-circle-exclamation text-[10px]"></i><span th:errors="*{nama}"></span>
                        </p>
                    </div>
                    <div>
                        <label class="text-xs font-medium text-slate-300 block mb-1.5">
                            <i class="fa-solid fa-envelope mr-1 text-indigo-400"></i>Email
                        </label>
                        <input type="email" th:field="*{email}" required
                               class="input-field w-full px-4 py-3 rounded-xl bg-slate-800/50 text-white outline-none border border-slate-700/50 focus:border-indigo-500/50 text-sm placeholder:text-slate-500"
                               placeholder="email@example.com">
                        <p th:if="${#fields.hasErrors('email')}" class="text-red-400 text-xs mt-1 flex items-center gap-1">
                            <i class="fa-solid fa-circle-exclamation text-[10px]"></i><span th:errors="*{email}"></span>
                        </p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-medium text-slate-300 block mb-1.5">
                            <i class="fa-solid fa-key mr-1 text-indigo-400"></i>Password
                        </label>
                        <input type="password" th:field="*{password}" required
                               class="input-field w-full px-4 py-3 rounded-xl bg-slate-800/50 text-white outline-none border border-slate-700/50 focus:border-indigo-500/50 text-sm placeholder:text-slate-500"
                               placeholder="Min. 6 karakter">
                        <p th:if="${#fields.hasErrors('password')}" class="text-red-400 text-xs mt-1 flex items-center gap-1">
                            <i class="fa-solid fa-circle-exclamation text-[10px]"></i><span th:errors="*{password}"></span>
                        </p>
                    </div>
                    <div>
                        <label class="text-xs font-medium text-slate-300 block mb-1.5">
                            <i class="fa-solid fa-id-card mr-1 text-indigo-400"></i>NIK
                        </label>
                        <input type="text" th:field="*{nik}" required maxlength="16"
                               class="input-field w-full px-4 py-3 rounded-xl bg-slate-800/50 text-white outline-none border border-slate-700/50 focus:border-indigo-500/50 text-sm placeholder:text-slate-500"
                               placeholder="16 digit NIK">
                        <p th:if="${#fields.hasErrors('nik')}" class="text-red-400 text-xs mt-1 flex items-center gap-1">
                            <i class="fa-solid fa-circle-exclamation text-[10px]"></i><span th:errors="*{nik}"></span>
                        </p>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-medium text-slate-300 block mb-1.5">
                        <i class="fa-solid fa-location-dot mr-1 text-indigo-400"></i>Alamat
                    </label>
                    <textarea th:field="*{alamat}" required rows="2"
                              class="input-field w-full px-4 py-3 rounded-xl bg-slate-800/50 text-white outline-none border border-slate-700/50 focus:border-indigo-500/50 text-sm placeholder:text-slate-500 resize-none"
                              placeholder="Alamat lengkap"></textarea>
                    <p th:if="${#fields.hasErrors('alamat')}" class="text-red-400 text-xs mt-1 flex items-center gap-1">
                        <i class="fa-solid fa-circle-exclamation text-[10px]"></i><span th:errors="*{alamat}"></span>
                    </p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-medium text-slate-300 block mb-1.5">
                            <i class="fa-solid fa-phone mr-1 text-indigo-400"></i>No. Telepon
                        </label>
                        <input type="text" th:field="*{nomorTelepon}" required
                               class="input-field w-full px-4 py-3 rounded-xl bg-slate-800/50 text-white outline-none border border-slate-700/50 focus:border-indigo-500/50 text-sm placeholder:text-slate-500"
                               placeholder="08xxxxxxx">
                        <p th:if="${#fields.hasErrors('nomorTelepon')}" class="text-red-400 text-xs mt-1 flex items-center gap-1">
                            <i class="fa-solid fa-circle-exclamation text-[10px]"></i><span th:errors="*{nomorTelepon}"></span>
                        </p>
                    </div>
                    <div>
                        <label class="text-xs font-medium text-slate-300 block mb-1.5">
                            <i class="fa-solid fa-calendar mr-1 text-indigo-400"></i>Tanggal Lahir
                        </label>
                        <input type="date" th:field="*{tanggalLahir}"
                               class="input-field w-full px-4 py-3 rounded-xl bg-slate-800/50 text-white outline-none border border-slate-700/50 focus:border-indigo-500/50 text-sm">
                    </div>
                </div>

                <div th:if="${error}" class="flex items-center gap-3 bg-red-500/10 border border-red-500/20 text-red-300 px-4 py-3 rounded-xl text-sm">
                    <i class="fa-solid fa-circle-exclamation text-red-400"></i>
                    <span th:text="${error}"></span>
                </div>

                <button type="submit" class="btn-primary w-full py-3.5 rounded-xl font-semibold text-white text-sm tracking-wide">
                    <i class="fa-solid fa-user-check mr-2"></i>Daftar Sekarang
                </button>
            </form>

            <div class="mt-5 text-center">
                <p class="text-slate-500 text-xs">
                    Sudah punya akun?
                    <a href="/login" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">
                        Masuk <i class="fa-solid fa-arrow-right text-[10px] ml-0.5"></i>
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('blur', function() {
                if (this.value.trim() === '' && this.hasAttribute('required')) {
                    this.classList.add('error');
                } else {
                    this.classList.remove('error');
                }
            });
            el.addEventListener('input', function() {
                this.classList.remove('error');
            });
        });
    </script>
</body>
</html>
