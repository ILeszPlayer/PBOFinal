<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Pengaduan - KomunServis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 flex h-screen overflow-hidden font-sans">

    <aside class="w-64 bg-slate-800 border-r border-slate-700 p-6 flex flex-col justify-between flex-shrink-0 sticky top-0 h-screen">
        <div class="space-y-6">
            <div class="flex items-center gap-2 px-2 text-indigo-400 font-black tracking-wider"><i class="fas fa-shield-halved text-xl"></i> CORE COMMAND</div>
            <nav class="space-y-2 text-xs font-bold">
                <a th:href="@{/admin/dashboard}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-700/50 hover:text-slate-200 transition-all"><i class="fas fa-chart-line"></i> Monitoring Dashboard</a>
                <a th:href="@{/admin/complaints/manage}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-700/50 hover:text-slate-200 transition-all"><i class="fas fa-list"></i> Kelola Pengaduan</a>
                <a th:href="@{/admin/warga}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-700/50 hover:text-slate-200 transition-all"><i class="fas fa-users"></i> Manajemen Warga</a>
                <a th:href="@{/admin/broadcasts}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-700/50 hover:text-slate-200 transition-all"><i class="fas fa-bullhorn"></i> Broadcast</a>
                <a th:href="@{/admin/polls}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-700/50 hover:text-slate-200 transition-all"><i class="fas fa-poll"></i> Polling</a>
                <a th:href="@{/admin/map}" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-600 text-white shadow-md"><i class="fas fa-map"></i> Peta Pengaduan</a>
            </nav>
        </div>
        <a th:href="@{/citizen/home}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-indigo-400 hover:bg-indigo-500/10 transition-all font-bold text-xs mb-2"><i class="fas fa-users"></i> Mode Publik</a>
        <a th:href="@{/logout}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-all font-bold text-xs"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black tracking-tight">Peta Persebaran Pengaduan</h1>
                <p class="text-slate-400 text-xs mt-0.5">Visualisasi geografis lokasi pengaduan warga</p>
            </div>
            <div class="flex items-center gap-2">
                <span id="markerCount" class="text-[10px] text-slate-500 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">0 titik</span>
                <button onclick="loadGeoData()" class="bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold text-xs px-3 py-2 rounded-xl transition-all"><i class="fas fa-rotate mr-1"></i> Refresh</button>
            </div>
        </div>

        <div class="bg-slate-800/60 border border-slate-700 rounded-2xl overflow-hidden shadow-xl" style="height: calc(100vh - 220px); min-height: 500px;">
            <div id="map" style="width: 100%; height: 100%;"></div>
        </div>

        <div id="mapLegend" class="mt-4 flex flex-wrap gap-4 text-xs text-slate-400 bg-slate-800/60 border border-slate-700 rounded-xl px-5 py-3">
            <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-amber-500 inline-block"></span> Pending</span>
            <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-blue-500 inline-block"></span> Diproses</span>
            <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-emerald-500 inline-block"></span> Selesai</span>
        </div>
    </main>

    <script>
        let map = null;
        let markersLayer = null;

        document.addEventListener('DOMContentLoaded', function() {
            map = L.map('map').setView([-6.9175, 107.6191], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 18
            }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
            loadGeoData();
        });

        function loadGeoData() {
            if (!markersLayer) return;
            markersLayer.clearLayers();
            document.getElementById('markerCount').textContent = 'Memuat...';

            fetch('/admin/api/geo/complaints')
                .then(res => res.json())
                .then(data => {
                    if (!data || data.length === 0) {
                        document.getElementById('markerCount').textContent = '0 titik (tidak ada data geolokasi)';
                        return;
                    }
                    document.getElementById('markerCount').textContent = data.length + ' titik';

                    const colors = { PENDING: '#f59e0b', PROSES: '#3b82f6', SELESAI: '#10b981' };
                    const labels = { PENDING: 'Pending', PROSES: 'Diproses', SELESAI: 'Selesai' };

                    data.forEach(c => {
                        if (!c.latitude || !c.longitude) return;
                        const color = colors[c.status] || '#64748b';
                        const icon = L.divIcon({
                            html: `<div style="width:24px;height:24px;background:${color};border:3px solid rgba(255,255,255,0.8);border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.3);"></div>`,
                            iconSize: [24, 24],
                            iconAnchor: [12, 12],
                            className: ''
                        });
                        const urgencyIcon = c.urgency === 'TINGGI' ? '🔴' : (c.urgency === 'SEDANG' ? '🟡' : '🟢');
                        const popup = `
                            <div style="font-family:sans-serif;min-width:200px;">
                                <strong style="font-size:13px;">${c.judul}</strong>
                                <div style="margin:4px 0;font-size:11px;color:#666;">
                                    <span>${urgencyIcon} ${labels[c.status] || c.status}</span>
                                    <span style="margin-left:8px;">👍 ${c.upvotesCount}</span>
                                </div>
                                <a href="/admin/complaints/${c.id}" style="display:inline-block;margin-top:4px;font-size:11px;color:#6366f1;text-decoration:none;font-weight:bold;">Lihat Detail →</a>
                            </div>
                        `;
                        L.marker([c.latitude, c.longitude], { icon }).addTo(markersLayer)
                            .bindPopup(popup);
                    });

                    if (data.length > 0) {
                        const validCoords = data.filter(c => c.latitude && c.longitude);
                        if (validCoords.length > 0) {
                            const bounds = validCoords.map(c => [c.latitude, c.longitude]);
                            map.fitBounds(bounds, { padding: [50, 50] });
                        }
                    }
                }).catch(err => {
                    document.getElementById('markerCount').textContent = 'Gagal memuat data';
                    console.error('Map data error:', err);
                });
        }
    </script>
</body>
</html>
