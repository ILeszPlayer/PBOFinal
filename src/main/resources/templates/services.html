<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Layanan Masyarakat</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap"
          rel="stylesheet">

    <style>
        body{
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen">

<div th:replace="layouts/sidebar :: sidebar"></div>

<main class="ml-72 min-h-screen">

    <div th:replace="layouts/navbar :: navbar"></div>

    <section class="p-8">

        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-800">
                    Layanan Masyarakat
                </h1>

                <p class="text-slate-500 mt-2">
                    Ajukan layanan administrasi masyarakat.
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <div class="bg-white rounded-3xl p-6 shadow-lg border border-slate-100">
                <h2 class="text-xl font-extrabold text-slate-800 mb-5">
                    Ajukan Layanan
                </h2>

                <form action="/services/save"
                      method="post"
                      th:object="${serviceRequest}"
                      class="space-y-4">

                    <div>
                        <label class="text-sm font-bold text-slate-600">
                            Nomor Request
                        </label>

                        <input type="text"
                               th:field="*{nomorRequest}"
                               required
                               class="w-full mt-2 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-green-500 outline-none"
                               placeholder="Contoh: SRV-001">
                    </div>

                    <button type="submit"
                            class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold transition shadow-lg shadow-green-600/30">
                        Ajukan Layanan
                    </button>

                </form>
            </div>

            <div class="lg:col-span-2 bg-white rounded-3xl p-6 shadow-lg border border-slate-100">
                <h2 class="text-xl font-extrabold text-slate-800 mb-5">
                    Daftar Pengajuan
                </h2>

                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                        <tr class="border-b text-left text-slate-500">
                            <th class="py-3">Nomor Request</th>
                            <th class="py-3">Status</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:if="${#lists.isEmpty(services)}">
                            <td colspan="2" class="py-8 text-center text-slate-400">
                                Belum ada pengajuan layanan.
                            </td>
                        </tr>

                        <tr th:each="s : ${services}"
                            class="border-b hover:bg-slate-50">

                            <td class="py-4 font-bold text-slate-800"
                                th:text="${s.nomorRequest}">
                                SRV-001
                            </td>

                            <td class="py-4">
                                <span class="px-3 py-1 rounded-full bg-green-100 text-green-700 text-sm font-bold"
                                      th:text="${s.status}">
                                    Menunggu
                                </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>

        </div>

    </section>

</main>

</body>
</html>
